<!doctype html>
<html>
  <head>
    <title>stash</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📌</text></svg>"
    />
  </head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #111210;
      --text: #ddd8d0;
      --muted: #3d3d3a;
      --muted-hover: #a8a49c;
      --border: rgba(255, 255, 255, 0.07);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f2f0eb;
        --text: #111;
        --muted: #bbb;
        --muted-hover: #444;
        --border: rgba(0, 0, 0, 0.09);
      }
    }

    body {
      background: var(--bg);
      min-height: 100vh;
    }

    #header {
      padding: 1.6rem 2rem 1.4rem;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      position: relative;
      z-index: 10;
    }

    #left {
      display: flex;
      align-items: baseline;
      gap: 1.1rem;
      flex-wrap: wrap;
    }

    h1 {
      font:
        italic normal 20px/1 Georgia,
        serif;
      color: var(--text);
      white-space: nowrap;
      letter-spacing: 0.01em;
    }

    #nav {
      display: flex;
      gap: 0.8rem;
      align-items: baseline;
      flex-wrap: wrap;
    }

    #nav a {
      font:
        italic normal 14px/1 Georgia,
        serif;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.01em;
      transition: color 0.15s;
    }
    #nav a:hover {
      color: var(--muted-hover);
    }

    #count {
      font:
        italic normal 14px/1 Georgia,
        serif;
      color: var(--muted);
      white-space: nowrap;
      margin-left: auto;
    }

    #content {
      padding: 0 2rem 4rem;
    }

    .cat-title {
      font:
        italic normal 24px/1 Georgia,
        serif;
      color: var(--text);
      letter-spacing: 0.01em;
      padding-bottom: 0.8rem;
    }

    .cat-container {
      position: relative;
      width: 100%;
      margin-bottom: 3rem;
      margin-top: 1rem;
    }

    .card {
      position: absolute;
      cursor: pointer;
      border-radius: 5px;
      overflow: hidden;
      border: 1px solid var(--border);
      text-decoration: none;
      display: block;
    }

    .card img.thumb {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.15s;
    }
    .card:hover img.thumb {
      opacity: 0.75;
    }

    .overlay {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(18, 18, 16, 0.92);
      color: #e8e8e8;
      font:
        12px/1.3 -apple-system,
        sans-serif;
      padding: 7px 10px 7px 8px;
      border-radius: 8px;
      white-space: nowrap;
      max-width: 88%;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      align-items: center;
      gap: 6px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .card:hover .overlay {
      opacity: 1;
    }

    .overlay img.fav {
      width: 14px;
      height: 14px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .overlay .arrow {
      margin-left: 2px;
      font-size: 10px;
      opacity: 0.5;
      flex-shrink: 0;
    }

    @media (max-width: 600px) {
      #header {
        padding: 1rem 1rem 0.8rem;
        flex-direction: column;
        gap: 0.4rem;
      }
      #left {
        flex-direction: column;
        gap: 0.3rem;
      }
      #count {
        margin-left: 0;
        font-size: 14px;
        align-self: flex-end;
      }
      h1 {
        font-size: 18px;
      }
      #nav {
        gap: 0.6rem;
      }
      #nav a {
        font-size: 14px;
      }
      #content {
        padding: 0 1rem 3rem;
      }
      .cat-title {
        font-size: 20px;
      }
    }
  </style>

  <div id="header">
    <div id="left">
      <h1 id="title"></h1>
      <div id="nav"></div>
    </div>
    <div id="count"></div>
  </div>

  <div id="content"></div>

  <script>
    let allData = {},
      allYears = [];

    function getYear() {
      const h = location.hash.slice(1);
      return allYears.includes(h) ? h : allYears[0];
    }

    function displaySize(w, h, maxW) {
      const r = (w * h) / (500 * 300);
      const dw = parseInt(r > 16 ? w / 8 : r > 4 ? w / 4 : w / 2);
      const dh = parseInt(r > 16 ? h / 8 : r > 4 ? h / 4 : h / 2);
      return [Math.min(dw, maxW - 10), dh];
    }

    function scatter(entries, containerEl) {
      const sw = containerEl.getBoundingClientRect().width;
      const pairs = entries.map(({ w, h }) => displaySize(w, h, sw));

      // smart starting height — scales with actual content, not a fixed 600.
      // few images get a small container, many images grow naturally.
      const totalArea = pairs.reduce((sum, [w, h]) => sum + w * h, 0);
      const tallest = Math.max(...pairs.map(([, h]) => h));
      const startHeight = Math.max(
        tallest + 20,
        Math.sqrt(totalArea * (sw / 900)),
      );

      let pos = [];

      entries.forEach((bm, i) => {
        let H = startHeight;
        const [w, h] = pairs[i];

        // same packing approach as vibes: 50 random attempts, then grow by 50px
        outer: while (true) {
          for (let attempt = 0; attempt < 50; attempt++) {
            const al = Math.random() * (sw - w);
            const at = Math.random() * (H - h);
            let hit = false;

            for (let j = 0; j < pos.length; j++) {
              const [bl, bt] = pos[j];
              if (
                al < bl + pairs[j][0] &&
                al + w > bl &&
                at < bt + pairs[j][1] &&
                at + h > bt
              ) {
                hit = true;
                break;
              }
            }

            if (!hit) {
              pos.push([parseInt(al), parseInt(at)]);
              break outer;
            }
          }
          H += 50;
        }
      });

      // container height = exactly as tall as the placed images require
      const maxBottom = Math.max(...pos.map(([, t], i) => t + pairs[i][1]));
      containerEl.style.height = maxBottom + 20 + "px";

      entries.forEach((bm, i) => {
        const [left, top] = pos[i];
        const [pw, ph] = pairs[i];

        const a = document.createElement("a");
        a.className = "card";
        a.href = bm.url;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.style.cssText = `top:${top}px;left:${left}px;width:${pw}px;height:${ph}px`;

        const img = document.createElement("img");
        img.className = "thumb";
        img.src = bm.image;
        img.alt = bm.title;
        img.loading = "lazy";
        a.appendChild(img);

        const overlay = document.createElement("div");
        overlay.className = "overlay";

        const fav = document.createElement("img");
        fav.className = "fav";
        fav.src = bm.favicon;
        fav.alt = "";
        overlay.appendChild(fav);

        const span = document.createElement("span");
        span.textContent = bm.title;
        overlay.appendChild(span);

        const arrow = document.createElement("span");
        arrow.className = "arrow";
        arrow.textContent = "↗";
        overlay.appendChild(arrow);

        a.appendChild(overlay);
        containerEl.appendChild(a);
      });
    }

    function renderYear(year) {
      const yearData = allData[year] || {};
      const cats = Object.keys(yearData);
      const total = cats.reduce((n, c) => n + yearData[c].length, 0);

      document.getElementById("title").textContent = year + " stash";
      document.title = year + " stash";
      document.getElementById("count").textContent = total + " bookmarks";
      document.getElementById("nav").innerHTML = allYears
        .filter((y) => y !== year)
        .map((y) =>
          y === allYears[0]
            ? `<a href="./">${y}</a>`
            : `<a href="#${y}">${y}</a>`,
        )
        .join(" ");

      const newUrl =
        year === allYears[0]
          ? location.pathname
          : location.pathname + "#" + year;
      history.replaceState(null, "", newUrl);

      const content = document.getElementById("content");
      content.innerHTML = "";

      cats.forEach((cat) => {
        const heading = document.createElement("div");
        heading.className = "cat-title";
        heading.textContent = cat;
        content.appendChild(heading);

        const container = document.createElement("div");
        container.className = "cat-container";
        content.appendChild(container);

        requestAnimationFrame(() => scatter(yearData[cat], container));
      });
    }

    window.addEventListener("hashchange", () => renderYear(getYear()));

    fetch("stash.json")
      .then((r) => r.json())
      .then(({ years, data }) => {
        allYears = years;
        allData = data;
        renderYear(getYear());
      });
  </script>
</html>
